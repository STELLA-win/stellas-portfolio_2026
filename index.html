<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Stella’s Portfolio_2026">
  <meta name="theme-color" content="#250b13">
  <title>Stella’s Portfolio_2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap');

    /* ===========================================
       THEME AND PRESENTATION CHROME
       The authored slides remain untouched images.
       =========================================== */
    :root {
      --stage-bg: #17090e;
      --slide-bg: #f5eee8;
      --plum: #7d263f;
      --wine: #3b0d1b;
      --paper: #f5eee8;
      --ui-font: 'Noto Sans SC', sans-serif;
      --display-font: 'Cormorant Garamond', serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===========================================
       FIXED 16:9 STAGE: MANDATORY BASE STYLES
       Slides are authored at 1920x1080 and scaled as a whole.
       =========================================== */
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--stage-bg, #000);
    }

    .deck-viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(125, 38, 63, 0.18), transparent 54%),
        var(--stage-bg, #000);
    }

    .deck-stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      transform-origin: 0 0;
      background: var(--slide-bg, #fff);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.42);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      display: block;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: var(--slide-bg, #fff);
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
    }

    .slide.active,
    .slide.visible {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }

    .slide.transitioning {
      visibility: visible;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .slide.entering { z-index: 3; }
    .slide.leaving { z-index: 2; }

    .slide.enter-next {
      animation: enter-next 540ms var(--ease) both;
      box-shadow: -30px 0 54px rgba(36, 10, 19, 0.2);
    }

    .slide.leave-next {
      animation: leave-next 540ms var(--ease) both;
    }

    .slide.enter-prev {
      animation: enter-prev 540ms var(--ease) both;
      box-shadow: 30px 0 54px rgba(36, 10, 19, 0.2);
    }

    .slide.leave-prev {
      animation: leave-prev 540ms var(--ease) both;
    }

    @keyframes enter-next {
      from { opacity: 0.98; transform: translate3d(150px, 0, 0) scale(0.986); }
      to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
    }

    @keyframes leave-next {
      from { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
      to { opacity: 0.9; transform: translate3d(-105px, 0, 0) scale(0.992); }
    }

    @keyframes enter-prev {
      from { opacity: 0.98; transform: translate3d(-150px, 0, 0) scale(0.986); }
      to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
    }

    @keyframes leave-prev {
      from { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
      to { opacity: 0.9; transform: translate3d(105px, 0, 0) scale(0.992); }
    }

    .slide.dragging {
      animation: none !important;
      transition: none;
    }

    .slide.dragging.active {
      z-index: 3;
      box-shadow: 0 0 58px rgba(36, 10, 19, 0.22);
    }
    .slide.drag-preview { z-index: 2; }

    img,
    video,
    canvas,
    svg {
      max-width: 100%;
      max-height: 100%;
    }

    @media print {
      html,
      body {
        width: 1920px;
        height: auto;
        overflow: visible;
        background: #fff;
      }

      .deck-viewport {
        position: static;
        overflow: visible;
        background: #fff;
      }

      .deck-stage {
        position: static;
        width: auto;
        height: auto;
        transform: none !important;
        background: none;
        box-shadow: none;
      }

      .slide {
        position: relative;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        width: 1920px;
        height: 1080px;
        break-after: page;
        page-break-after: always;
      }

      .slide:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      .edge-nav,
      .help-panel {
        display: none !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
      }
    }

    /* ===========================================
       SOURCE-PAGE REPLICA
       Each image is a 1920x1080 render from the final PDF.
       =========================================== */
    .page-image {
      display: block;
      width: 1920px;
      height: 1080px;
      max-width: none;
      max-height: none;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
    }

    .interactive-hotspot {
      position: absolute;
      z-index: 4;
      display: block;
      border: 2px solid transparent;
      border-radius: 4px;
    }

    .interactive-hotspot:focus-visible {
      border-color: rgba(116, 40, 60, 0.72);
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    .video-link-label { left: 890px; top: 205px; width: 135px; height: 62px; }
    .video-link-frame { left: 545px; top: 292px; width: 480px; height: 330px; }
    .game-link-label { left: 80px; top: 340px; width: 196px; height: 58px; }
    .game-link-qr { left: 1735px; top: 925px; width: 126px; height: 120px; }

    /* ===========================================
       NAVIGATION UI
       Kept outside the slide so the original layout stays exact.
       =========================================== */
    .edge-nav {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 900;
      width: 12vw;
      max-width: 180px;
      border: 0;
      color: transparent;
      background: transparent;
      cursor: pointer;
    }

    .edge-nav.prev { left: 0; }
    .edge-nav.next { right: 0; }

    .edge-nav::after {
      position: absolute;
      top: 50%;
      color: rgba(255, 255, 255, 0.72);
      font: 500 34px/1 var(--display-font);
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .edge-nav.prev::after {
      content: '\2039';
      left: 26px;
      transform: translate(8px, -50%);
    }

    .edge-nav.next::after {
      content: '\203A';
      right: 26px;
      transform: translate(-8px, -50%);
    }

    .edge-nav:hover::after,
    .edge-nav:focus-visible::after {
      opacity: 1;
      transform: translate(0, -50%);
    }

    .edge-nav:focus-visible { outline: none; }

    /* ===========================================
       HELP PANEL
       =========================================== */
    .help-panel {
      position: fixed;
      right: 22px;
      top: 22px;
      z-index: 1200;
      width: 270px;
      padding: 18px 20px;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(24, 9, 14, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font: 400 13px/1.8 var(--ui-font);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 200ms ease, transform 240ms var(--ease), visibility 200ms;
    }

    .help-panel.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .help-panel strong {
      display: block;
      margin-bottom: 7px;
      color: #fff;
      font: 600 19px/1.2 var(--display-font);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.76);
      background: var(--stage-bg);
      font: 500 13px/1 var(--ui-font);
      letter-spacing: 0.14em;
      transition: opacity 400ms ease, visibility 400ms;
    }

    .loading.done {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>

  <script>
    /* ===========================================
       FIXED-STAGE PRESENTATION CONTROLLER
       =========================================== */
    class SlidePresentation {
      constructor() {
        this.stage = document.getElementById('deckStage');
        this.slides = [...document.querySelectorAll('.slide')];
        this.currentSlide = this.readHash();
        this.helpPanel = document.getElementById('helpPanel');
        this.wheelLocked = false;
        this.isAnimating = false;
        this.stageScale = 1;
        this.reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        this.webpSupported = document.createElement('canvas')
          .toDataURL('image/webp')
          .startsWith('data:image/webp');
        this.touch = this.emptyTouchState();

        this.setupStageScale();
        this.setupControls();
        this.setupKeyboardNav();
        this.setupTouchNav();
        this.setupWheelNav();
        this.setupHashNav();
        this.renderInstant(this.currentSlide, false);
        this.initializeImages();
      }

      emptyTouchState() {
        return {
          tracking: false,
          horizontal: false,
          startX: 0,
          startY: 0,
          dx: 0,
          targetIndex: -1,
          direction: 0
        };
      }

      readHash() {
        const match = window.location.hash.match(/slide=(\d+)/);
        const index = match ? Number(match[1]) - 1 : 0;
        return Math.max(0, Math.min(index, 12));
      }

      setupStageScale() {
        const scaleStage = () => {
          const factor = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
          this.stageScale = factor;
          const x = (window.innerWidth - 1920 * factor) / 2;
          const y = (window.innerHeight - 1080 * factor) / 2;
          this.stage.style.transform = `translate(${x}px, ${y}px) scale(${factor})`;
        };
        scaleStage();
        window.addEventListener('resize', scaleStage, { passive: true });
      }

      setupControls() {
        const prev = () => this.showSlide(this.currentSlide - 1);
        const next = () => this.showSlide(this.currentSlide + 1);
        document.getElementById('edgePrev').addEventListener('click', prev);
        document.getElementById('edgeNext').addEventListener('click', next);
      }

      setupKeyboardNav() {
        document.addEventListener('keydown', (event) => {
          if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(event.key)) {
            event.preventDefault();
            this.showSlide(this.currentSlide + 1);
          } else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(event.key)) {
            event.preventDefault();
            this.showSlide(this.currentSlide - 1);
          } else if (event.key === 'Home') {
            event.preventDefault();
            this.showSlide(0);
          } else if (event.key === 'End') {
            event.preventDefault();
            this.showSlide(this.slides.length - 1);
          } else if (event.key.toLowerCase() === 'h') {
            this.toggleHelp();
          } else if (event.key === 'Escape') {
            this.helpPanel.classList.remove('show');
          }
        });
      }

      setupTouchNav() {
        document.addEventListener('touchstart', (event) => {
          if (this.isAnimating || event.touches.length !== 1) return;
          if (event.target instanceof Element && event.target.closest('a, button')) return;
          const touch = event.touches[0];
          this.touch = {
            tracking: true,
            horizontal: false,
            startX: touch.clientX,
            startY: touch.clientY,
            dx: 0,
            targetIndex: -1,
            direction: 0
          };
        }, { passive: true });

        document.addEventListener('touchmove', (event) => {
          if (!this.touch.tracking || event.touches.length !== 1) return;
          const touch = event.touches[0];
          let dx = touch.clientX - this.touch.startX;
          const dy = touch.clientY - this.touch.startY;

          if (!this.touch.horizontal) {
            if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
            if (Math.abs(dy) >= Math.abs(dx)) {
              this.touch.tracking = false;
              return;
            }
            this.touch.horizontal = true;
          }

          event.preventDefault();
          const direction = dx < 0 ? 1 : -1;
          const targetIndex = this.currentSlide + direction;
          const isValidTarget = targetIndex >= 0 && targetIndex < this.slides.length;
          if (isValidTarget && !this.isSlideLoaded(targetIndex)) {
            this.ensureSlideLoaded(targetIndex, true);
          }
          const hasTarget = isValidTarget && this.isSlideLoaded(targetIndex);
          if (!hasTarget) dx *= 0.24;

          const authoredDx = dx / Math.max(this.stageScale, 0.01);
          const progress = Math.min(1, Math.abs(dx) / Math.max(window.innerWidth * 0.72, 1));
          const activeSlide = this.slides[this.currentSlide];

          activeSlide.classList.add('visible', 'transitioning', 'dragging');
          activeSlide.style.transform = `translate3d(${authoredDx}px, 0, 0) scale(${1 - progress * 0.006})`;
          activeSlide.style.opacity = '1';

          if (this.touch.targetIndex !== targetIndex) {
            if (this.touch.targetIndex >= 0 && this.touch.targetIndex < this.slides.length) {
              this.resetMotion(this.slides[this.touch.targetIndex], true);
            }
            this.touch.targetIndex = hasTarget ? targetIndex : -1;
          }

          if (hasTarget) {
            const targetSlide = this.slides[targetIndex];
            if (!targetSlide.classList.contains('drag-preview')) {
              this.resetMotion(targetSlide, true);
            }
            targetSlide.classList.add('visible', 'transitioning', 'dragging', 'drag-preview');
            targetSlide.style.transform = `translate3d(${authoredDx + direction * 1920}px, 0, 0) scale(1)`;
            targetSlide.style.opacity = '1';
          }

          this.touch.dx = dx;
          this.touch.direction = direction;
        }, { passive: false });

        document.addEventListener('touchend', () => {
          this.finishTouchGesture(false);
        }, { passive: true });

        document.addEventListener('touchcancel', () => {
          this.finishTouchGesture(true);
        }, { passive: true });
      }

      finishTouchGesture(forceCancel) {
        if (!this.touch.tracking || !this.touch.horizontal) {
          this.touch = this.emptyTouchState();
          return;
        }

        const activeSlide = this.slides[this.currentSlide];
        const targetIndex = this.touch.targetIndex;
        const targetSlide = targetIndex >= 0 ? this.slides[targetIndex] : null;
        const threshold = Math.max(54, window.innerWidth * 0.14);
        const shouldCommit = !forceCancel && targetSlide && Math.abs(this.touch.dx) >= threshold;
        const direction = this.touch.direction;
        const duration = shouldCommit ? 430 : 300;

        this.isAnimating = true;
        activeSlide.style.transition = `transform ${duration}ms var(--ease), opacity ${duration}ms ease`;
        if (targetSlide) {
          targetSlide.style.transition = `transform ${duration}ms var(--ease), opacity ${duration}ms ease`;
        }

        requestAnimationFrame(() => requestAnimationFrame(() => {
          activeSlide.style.transform = shouldCommit
            ? `translate3d(${-direction * 1920}px, 0, 0) scale(0.994)`
            : 'translate3d(0, 0, 0) scale(1)';
          activeSlide.style.opacity = '1';

          if (targetSlide) {
            targetSlide.style.transform = shouldCommit
              ? 'translate3d(0, 0, 0) scale(1)'
              : `translate3d(${direction * 1920}px, 0, 0) scale(1)`;
            targetSlide.style.opacity = '1';
          }
        }));

        window.setTimeout(() => {
          if (shouldCommit) {
            this.resetMotion(activeSlide, true);
            this.currentSlide = targetIndex;
            this.resetMotion(targetSlide, true);
            targetSlide.classList.add('active', 'visible');
            this.updateChrome(targetIndex, true);
          } else {
            this.resetMotion(activeSlide, true);
            activeSlide.classList.add('active', 'visible');
            if (targetSlide) this.resetMotion(targetSlide, true);
          }

          this.touch = this.emptyTouchState();
          this.isAnimating = false;
        }, duration + 35);
      }

      setupWheelNav() {
        document.addEventListener('wheel', (event) => {
          if (this.wheelLocked || Math.abs(event.deltaY) < 18) return;
          this.wheelLocked = true;
          this.showSlide(this.currentSlide + (event.deltaY > 0 ? 1 : -1));
          window.setTimeout(() => { this.wheelLocked = false; }, 620);
        }, { passive: true });
      }

      setupHashNav() {
        window.addEventListener('hashchange', () => {
          const target = this.readHash();
          if (target !== this.currentSlide) this.showSlide(target, false);
        });
      }

      showSlide(index, updateHash = true) {
        const nextIndex = Math.max(0, Math.min(index, this.slides.length - 1));
        if (nextIndex === this.currentSlide) {
          this.updateChrome(nextIndex, updateHash);
          return;
        }
        if (this.isAnimating) return;
        if (!this.isSlideLoaded(nextIndex)) {
          this.isAnimating = true;
          this.ensureSlideLoaded(nextIndex, true).then(() => {
            this.isAnimating = false;
            this.showSlide(nextIndex, updateHash);
          }).catch(() => {
            this.isAnimating = false;
          });
          return;
        }
        if (this.reducedMotion) {
          this.renderInstant(nextIndex, updateHash);
          this.prefetchAround(nextIndex);
          return;
        }

        const previousIndex = this.currentSlide;
        const outgoing = this.slides[previousIndex];
        const incoming = this.slides[nextIndex];
        const direction = nextIndex > previousIndex ? 'next' : 'prev';
        this.isAnimating = true;

        this.resetMotion(outgoing, false);
        this.resetMotion(incoming, true);
        outgoing.classList.add('active', 'visible', 'transitioning', 'leaving', `leave-${direction}`);
        incoming.classList.add('visible', 'transitioning', 'entering', `enter-${direction}`);

        this.currentSlide = nextIndex;
        this.updateChrome(nextIndex, updateHash);

        window.setTimeout(() => {
          this.resetMotion(outgoing, true);
          this.resetMotion(incoming, true);
          incoming.classList.add('active', 'visible');
          this.isAnimating = false;
          this.prefetchAround(nextIndex);
        }, 575);
      }

      renderInstant(index, updateHash = true) {
        this.slides.forEach((slide, slideIndex) => {
          this.resetMotion(slide, true);
          if (slideIndex === index) slide.classList.add('active', 'visible');
        });
        this.currentSlide = index;
        this.updateChrome(index, updateHash);
      }

      resetMotion(slide, removeVisibility) {
        if (!slide) return;
        slide.classList.remove(
          'transitioning', 'entering', 'leaving',
          'enter-next', 'leave-next', 'enter-prev', 'leave-prev',
          'dragging', 'drag-preview'
        );
        slide.style.removeProperty('transform');
        slide.style.removeProperty('opacity');
        slide.style.removeProperty('transition');
        if (removeVisibility) slide.classList.remove('active', 'visible');
      }

      updateChrome(index, updateHash) {
        document.title = 'Stella’s Portfolio_2026';

        if (updateHash) {
          history.replaceState(null, '', `#slide=${index + 1}`);
        }
      }

      toggleHelp() {
        this.helpPanel.classList.toggle('show');
      }

      selectImageSource(image) {
        if (!this.webpSupported) return image.dataset.fallback;
        const displayedPhysicalWidth = 1920
          * this.stageScale
          * Math.min(window.devicePixelRatio || 1, 3);
        return displayedPhysicalWidth > 2200 ? image.dataset.high : image.dataset.low;
      }

      isSlideLoaded(index) {
        const image = this.slides[index]?.querySelector('.page-image');
        return Boolean(image && image.dataset.loaded === 'true' && image.complete && image.naturalWidth > 0);
      }

      ensureSlideLoaded(index, highPriority = false) {
        const slide = this.slides[index];
        const image = slide?.querySelector('.page-image');
        if (!image) return Promise.reject(new Error(`Slide ${index + 1} has no image`));

        const desiredSource = this.selectImageSource(image);
        const currentSource = image.dataset.currentSource;
        const alreadyHighResolution = currentSource === image.dataset.high;
        if (this.isSlideLoaded(index) && (currentSource === desiredSource || alreadyHighResolution)) {
          return Promise.resolve(image);
        }
        if (image._loadPromise && image.dataset.loadingSource === desiredSource) {
          return image._loadPromise;
        }

        image.fetchPriority = highPriority ? 'high' : 'low';
        image.dataset.loadingSource = desiredSource;

        const loadUrl = (url) => new Promise((resolve, reject) => {
          const cleanup = () => {
            image.removeEventListener('load', onLoad);
            image.removeEventListener('error', onError);
          };
          const onLoad = async () => {
            cleanup();
            try { await image.decode(); } catch (_) { /* Decoding may already be complete. */ }
            image.dataset.loaded = 'true';
            image.dataset.currentSource = url;
            resolve(image);
          };
          const onError = () => {
            cleanup();
            reject(new Error(`Failed to load ${url}`));
          };
          image.addEventListener('load', onLoad, { once: true });
          image.addEventListener('error', onError, { once: true });
          image.src = url;
        });

        image._loadPromise = loadUrl(desiredSource)
          .catch(() => {
            if (desiredSource === image.dataset.fallback) throw new Error('Fallback image failed');
            return loadUrl(image.dataset.fallback);
          })
          .finally(() => {
            image._loadPromise = null;
            delete image.dataset.loadingSource;
          });
        return image._loadPromise;
      }

      prefetchAround(index) {
        [index - 1, index + 1]
          .filter((candidate) => candidate >= 0 && candidate < this.slides.length)
          .forEach((candidate) => this.ensureSlideLoaded(candidate, false).catch(() => {}));
      }

      initializeImages() {
        const loading = document.getElementById('loading');
        this.ensureSlideLoaded(this.currentSlide, true)
          .catch(() => {})
          .finally(() => {
            loading.classList.add('done');
            this.prefetchAround(this.currentSlide);
          });

        window.setTimeout(() => loading.classList.add('done'), 6000);
        window.addEventListener('beforeprint', () => {
          this.slides.forEach((_, index) => this.ensureSlideLoaded(index, true).catch(() => {}));
        });
      }
    }

    window.portfolioPresentation = new SlidePresentation();
  </script>
</body>
</html>
